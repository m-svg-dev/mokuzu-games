<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>藻屑社長クリッカー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 常時表示ヘッダー -->
  <header id="header">
    <div id="moku-display">藻: 0</div>
    <div id="mps-display">0 / 秒</div>
  </header>

  <!-- ① メイン画面 -->
  <div id="tab-main" class="tab-panel active">

    <!-- キャラ＋ステータス 横並び -->
    <div id="main-top">

      <!-- 左：キャラクター -->
      <div id="tap-area">
        <div id="character-img" class="suit-black">🌿</div>
        <div id="level-display">Lv.1　⬛ 黒スーツ</div>
        <div id="xp-wrap">
          <div id="xp-bar-bg"><div id="xp-bar"></div></div>
          <span id="xp-text">0 / 56</span>
        </div>
        <p id="tap-hint">タップで増殖！</p>
      </div>

      <!-- 右：ステータスパネル -->
      <div id="stats-panel">
        <div class="stat-block">
          <div class="stat-label">💪 タップ</div>
          <div class="stat-value" id="stat-tap-power">+1</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <div class="stat-label">⚙️ 自動収益</div>
          <div class="stat-value" id="stat-mps">0<span class="stat-unit">/秒</span></div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <div class="stat-label">👔 社員数</div>
          <div class="stat-value" id="stat-employees">0<span class="stat-unit">体</span></div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-block">
          <div class="stat-label">📈 総獲得藻</div>
          <div class="stat-value" id="stat-total-moku">0</div>
        </div>
      </div>
    </div>

    <!-- 覚醒バー -->
    <div id="awaken-bar">
      <div id="awaken-gauge-wrap">
        <div id="awaken-gauge-bar"></div>
      </div>
      <button id="awaken-btn" disabled>覚醒</button>
    </div>

    <div id="awaken-timer" class="hidden">
      ⚡ 覚醒中！残り <span id="awaken-time-val">30</span>秒
    </div>

  </div>

  <!-- ② 強化画面 -->
  <div id="tab-upgrade" class="tab-panel">
    <h2 class="panel-title">⚔️ タップ強化</h2>
    <div id="upgrade-list"></div>
  </div>

  <!-- ③ 社員/施設画面 -->
  <div id="tab-employee" class="tab-panel">
    <h2 class="panel-title">👔 社員</h2>
    <div id="employee-list"></div>
    <h2 class="panel-title" style="margin-top:20px">🏗️ 施設</h2>
    <div id="facility-list"></div>
  </div>

  <!-- ④ イベント & 設定画面 -->
  <div id="tab-event" class="tab-panel">
    <h2 class="panel-title">🎲 イベント</h2>
    <div id="event-area">
      <p class="event-standby">イベント待機中...</p>
      <p id="event-cooldown-display"></p>
    </div>

    <h2 class="panel-title" style="margin-top:24px">⚙️ 設定</h2>
    <div id="footer">
      <button id="save-btn">💾 セーブ</button>
      <button id="reset-btn">🗑️ リセット</button>
    </div>
  </div>

  <!-- タブナビゲーション（画面下部固定） -->
  <nav id="tab-nav">
    <button class="tab-btn active" data-tab="main">メイン</button>
    <button class="tab-btn" data-tab="upgrade">強化</button>
    <button class="tab-btn" data-tab="employee">社員</button>
    <button class="tab-btn" data-tab="event">イベント</button>
  </nav>

  <script src="script.js"></script>
</body>
</html>
